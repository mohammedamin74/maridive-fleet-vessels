name: Build Multi-Platform

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  FLUTTER_VERSION: '3.44.6'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Zip build output
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath maridive-fleet-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: maridive-fleet-windows
          path: maridive-fleet-windows.zip

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Zip build output
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../maridive-fleet-macos.zip "Maridive Fleet Vessels.app"
      - uses: actions/upload-artifact@v4
        with:
          name: maridive-fleet-macos
          path: maridive-fleet-macos.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: maridive-fleet-android
          path: build/app/outputs/flutter-apk/app-release.apk

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter config --enable-web
      - run: flutter pub get
      - run: flutter build web --release
      - uses: actions/upload-artifact@v4
        with:
          name: maridive-fleet-web
          path: build/web
