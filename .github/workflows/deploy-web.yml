name: Deploy Web to GitHub Pages

# Builds the Flutter web app and publishes it to GitHub Pages on every push to
# main, so the team always has a live, always-current URL to open in a browser.
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  FLUTTER_VERSION: '3.44.6'

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter config --enable-web
      - run: flutter pub get
      # base-href must match the Pages sub-path: /<repo-name>/
      - run: flutter build web --release --base-href "/maridive-fleet-vessels/"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
