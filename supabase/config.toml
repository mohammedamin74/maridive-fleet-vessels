# Minimal Supabase project config so `supabase functions deploy` works with
# `--project-ref`. The CLI fills sensible defaults for everything else.
project_id = "forcpesacwaektzyslyh"

# The admin-users function is called by signed-in admins (their JWT is sent in
# the Authorization header and re-checked inside the function), so keep the
# gateway JWT verification on.
[functions.admin-users]
verify_jwt = true

# The extract function reads an uploaded file and returns structured defect/
# requisition fields via Gemini. Called by any signed-in fleet user; the gateway
# verifies their JWT.
[functions.extract]
verify_jwt = true

# The assistant function answers app how-to questions via Gemini. Called by any
# signed-in fleet user; the gateway verifies their JWT. No fleet data is sent.
[functions.assistant]
verify_jwt = true
